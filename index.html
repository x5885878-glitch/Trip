<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>紐西蘭蜜月旅遊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:#0d0f18;color:#e8e8ec}
:root{
  --pink:#e8527a;--gold:#f0a500;--muted:#7a7d96;
  --green:#25c97a;--blue:#4da6ff;
  --border:rgba(255,255,255,0.09);
  --HDR:56px;--TABS:60px;
}

#app{position:fixed;inset:0;max-width:430px;margin:0 auto;overflow:hidden}

/* ── Header ── */
#hdr{position:absolute;top:0;left:0;right:0;height:var(--HDR);background:rgba(8,10,20,.92);padding:0 16px;display:flex;align-items:center;gap:8px;z-index:700;backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hdr-title{font-size:15px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:var(--muted)}
.cd{margin-left:auto;background:rgba(232,82,122,.15);border:1px solid rgba(232,82,122,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--pink);font-weight:700;white-space:nowrap}

/* ── Day tabs ── */
#dtabs{position:absolute;top:var(--HDR);left:0;right:0;height:var(--TABS);display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:rgba(8,10,20,.88);scrollbar-width:none;z-index:700;backdrop-filter:blur(12px);align-items:center}
#dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 9px;border-radius:16px;background:#1a1d2a;border:1px solid var(--border);cursor:pointer;min-width:54px;transition:.15s}
.dtab.on{background:var(--pink);border-color:var(--pink)}
.dtab .de{font-size:13px;line-height:1}
.dtab .dn{font-size:10px;font-weight:700;color:#fff}
.dtab .dd{font-size:9px;color:rgba(255,255,255,.6)}
.dtab:not(.on) .dn{color:var(--muted)}

/* ── Map (always full screen) ── */
#map{position:absolute;inset:0;z-index:1}

/* ── Region label ── */
#rgn-label{position:absolute;left:50%;transform:translateX(-50%);background:rgba(6,8,18,.85);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;color:var(--muted);z-index:600;backdrop-filter:blur(8px);white-space:nowrap;transition:top .35s ease}

/* ── Legend ── */
#legend{position:absolute;right:10px;background:rgba(6,8,18,.88);border:1px solid var(--border);border-radius:10px;padding:7px 9px;z-index:600;backdrop-filter:blur(6px);transition:bottom .35s ease}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.7);margin-bottom:3px}
.leg:last-child{margin-bottom:0}
.legdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Card carousel container ── */
#carousel{position:absolute;left:0;right:0;z-index:500;transition:bottom .35s cubic-bezier(.32,1,.22,1)}
/* horizontal scroll snap */
#carousel-track{display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 calc(50% - 155px);gap:12px}
#carousel-track::-webkit-scrollbar{display:none}

/* ── Individual card ── */
.card{flex-shrink:0;width:310px;scroll-snap-align:center;background:rgba(12,14,24,.95);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;will-change:transform}
.card.active{border-color:rgba(232,82,122,.6)}
/* photo shown only when active */
.card-photo{height:0;overflow:hidden;transition:height .32s ease}
.card.active .card-photo{height:130px}
.card-photo img{width:100%;height:130px;object-fit:cover;display:block}
.card-body{padding:12px 14px 13px}
.card-time{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:3px}
.card-row{display:flex;align-items:center;gap:8px}
.card-num{width:20px;height:20px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.card-title{font-size:14px;font-weight:700;color:#fff;flex:1;line-height:1.3}
.card-arrow{font-size:11px;color:var(--muted);transition:transform .3s;flex-shrink:0}
.card.active .card-arrow{transform:rotate(180deg)}
.card-detail{display:none;padding-top:9px}
.card.active .card-detail{display:block}
.card-note{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.tg{background:rgba(37,201,122,.15);color:var(--green);border:1px solid rgba(37,201,122,.3)}
.tb{background:rgba(77,166,255,.15);color:var(--blue);border:1px solid rgba(77,166,255,.3)}
.tp{background:rgba(232,82,122,.15);color:var(--pink);border:1px solid rgba(232,82,122,.3)}
.to{background:rgba(240,165,0,.15);color:var(--gold);border:1px solid rgba(240,165,0,.3)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-bottom:5px}
.b-ok{background:rgba(37,201,122,.2);color:var(--green);border:1px solid rgba(37,201,122,.3)}
.b-need{background:rgba(240,165,0,.2);color:var(--gold);border:1px solid rgba(240,165,0,.3)}
.b-tbd{background:rgba(122,125,150,.15);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.btnav{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:5px 12px;border-radius:16px;background:#0f1e40;border:1px solid #2960ad;color:#7ab8ff;font-size:11px;font-weight:700;text-decoration:none}

/* transport mini card */
.card-tr{flex-shrink:0;width:310px;scroll-snap-align:center;background:rgba(13,15,26,.7);border:1px dashed rgba(255,255,255,.07);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.tr-icon{font-size:16px;flex-shrink:0}
.tr-text{font-size:12px;color:var(--muted);line-height:1.45}

/* alt toggle */
.alt-pill{flex-shrink:0;width:310px;scroll-snap-align:center;background:rgba(240,165,0,.07);border:1px solid rgba(240,165,0,.2);border-radius:14px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.alt-lbl{font-size:12px;color:var(--gold);font-weight:700}
.toggle{display:flex;background:#0d0f18;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.topt{padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted)}
.topt.on{background:var(--gold);color:#150f00}

/* ── Dot indicator ── */
#dots{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:600}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:.2s}
.dot.on{background:var(--pink);width:14px;border-radius:3px}

/* ── Loading ── */
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;background:#0d0f18}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span style="font-size:20px">🥝</span>
    <div><div class="hdr-title">紐西蘭蜜月旅遊</div><div class="hdr-sub">Queenstown / Tekapo / Auckland・2人</div></div>
    <div class="cd" id="cd">計算中</div>
  </div>
  <div id="dtabs"></div>
  <div id="map"></div>
  <div id="rgn-label">載入中...</div>
  <div id="legend">
    <div class="leg"><div class="legdot" style="background:#25c97a"></div>餐飲</div>
    <div class="leg"><div class="legdot" style="background:#e8527a"></div>觀光</div>
    <div class="leg"><div class="legdot" style="background:#4da6ff"></div>交通</div>
    <div class="leg"><div class="legdot" style="background:#f0a500"></div>住宿</div>
  </div>
  <div id="carousel">
    <div id="dots"></div>
    <div id="carousel-track"></div>
  </div>
  <div id="loading"><div class="spin"></div><p style="font-size:13px;color:var(--muted)">載入行程中...</p></div>
</div>

<script>
const APPS_URL='https://script.google.com/macros/s/AKfycbzbQpA87vF39HLZBBbJKznW_9fsvi22cqNAPjyvPGvoMUyAczUnmFCBZsto09xXziM7/exec';
const GMKEY='AIzaSyD-HJV3XRaP_68Pk-BdaMmyheiHJhl332U';

// ── Layout constants ────────────────────────────
const HDR=56,TABS=60,TOP=HDR+TABS;
let VH=0,cardCollH=0,cardExpH=0,isExpanded=false;

function calcLayout(){
  VH=document.getElementById('app').offsetHeight;
  cardCollH=76; // collapsed card height approx
  cardExpH=cardCollH+130+130; // +photo+detail
  positionCarousel(false);
  positionOverlays();
}

function positionCarousel(animate){
  const car=document.getElementById('carousel');
  car.style.transition=animate?'bottom .35s cubic-bezier(.32,1,.22,1)':'none';
  // collapsed: peek from bottom ~220px
  const bottomH=isExpanded?Math.min(cardExpH+40,VH-TOP-80):220;
  car.style.bottom='0px';
  car.style.height=bottomH+'px';
  document.getElementById('carousel-track').style.alignItems='flex-end';
  document.getElementById('carousel-track').style.paddingBottom='16px';
  document.getElementById('carousel-track').style.paddingTop='16px';
  positionOverlays();
}

function positionOverlays(){
  const car=document.getElementById('carousel');
  const carH=car.offsetHeight||220;
  const mapBottom=VH-carH;
  // rgn label sits just above carousel
  const rgnEl=document.getElementById('rgn-label');
  rgnEl.style.top=(mapBottom-36)+'px';
  // legend bottom-right above carousel
  document.getElementById('legend').style.bottom=(carH+8)+'px';
  // dots above track
  document.getElementById('dots').style.bottom=(carH-14)+'px';
}

// ── Coords & helpers ─────────────────────────────
const COORDS={
  '皇后鎮機場':{lat:-45.021,lng:168.740},'皇后鎮':{lat:-45.031,lng:168.663},
  '皇后鎮市區':{lat:-45.031,lng:168.661},'Shotover 峽谷':{lat:-45.005,lng:168.717},
  '格林諾奇':{lat:-45.034,lng:168.376},'米佛峽灣':{lat:-44.641,lng:167.897},
  'Arthurs Point':{lat:-45.005,lng:168.707},'Gibbston Valley':{lat:-45.064,lng:168.813},
  '庫克山國家公園':{lat:-43.526,lng:170.194},'庫克山':{lat:-43.737,lng:170.101},
  '蒂卡波湖':{lat:-44.005,lng:170.478},'蒂卡波':{lat:-44.007,lng:170.479},
  '奧克蘭':{lat:-36.851,lng:174.765},'奧克蘭機場區':{lat:-37.008,lng:174.785},
  '奧克蘭碼頭':{lat:-36.840,lng:174.769},'奧克蘭市區':{lat:-36.851,lng:174.765},
  'Waitomo':{lat:-38.259,lng:175.101},'Matamata':{lat:-37.810,lng:175.774},
  'Hobbiton':{lat:-37.858,lng:175.682},'桃園機場':{lat:25.079,lng:121.234},
};
const DAY_CENTERS=[
  {k:['格林諾奇'],c:{lat:-45.034,lng:168.376},z:12},
  {k:['米佛'],c:{lat:-44.641,lng:167.897},z:10},
  {k:['庫克山','蒂卡波'],c:{lat:-43.74,lng:170.10},z:10},
  {k:['Waitomo','Hobbiton','哈比'],c:{lat:-38.259,lng:175.101},z:10},
  {k:['奧克蘭'],c:{lat:-36.851,lng:174.765},z:13},
  {k:['皇后鎮','Queenstown'],c:{lat:-45.031,lng:168.663},z:13},
  {k:['桃園','台灣'],c:{lat:-37.008,lng:174.785},z:12},
];
function getDayCenter(r){for(const d of DAY_CENTERS)if(d.k.some(k=>r.includes(k)))return{center:d.c,zoom:d.z};return{center:{lat:-45.031,lng:168.663},zoom:12};}
function getCoord(p){if(!p)return null;const k=p.split('→')[0].trim();return COORDS[k]||COORDS[p]||null;}

const PHOTOS=[
  {k:['機場','航班','落地','桃園'],u:'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=600&q=80'},
  {k:['Skyline','Gondola','纜車','滑車'],u:'https://images.unsplash.com/photo-1589802829985-817e51171b92?w=600&q=80'},
  {k:['Fergburger','漢堡','Fish','Chips'],u:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80'},
  {k:['婚紗','格林諾奇'],u:'https://images.unsplash.com/photo-1519741497674-611481863552?w=600&q=80'},
  {k:['米佛','Milford','峽灣','遊船'],u:'https://images.unsplash.com/photo-1572375992501-4b0892d50c69?w=600&q=80'},
  {k:['跳傘','Nzone'],u:'https://images.unsplash.com/photo-1601024445121-e5b82f020549?w=600&q=80'},
  {k:['Shotover','噴射船'],u:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=600&q=80'},
  {k:['溫泉','Onsen'],u:'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=600&q=80'},
  {k:['酒莊','Winery','Amisfield','Gibbston'],u:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=600&q=80'},
  {k:['冰川','直升機'],u:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80'},
  {k:['庫克山','胡克','健行'],u:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80'},
  {k:['蒂卡波','Tekapo','善牧','教堂','散步'],u:'https://images.unsplash.com/photo-1548032885-b5e38734688a?w=600&q=80'},
  {k:['觀星','Observatory'],u:'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=600&q=80'},
  {k:['Sky Tower','奧克蘭','Auckland','自由行'],u:'https://images.unsplash.com/photo-1609137144813-7d9921338f24?w=600&q=80'},
  {k:['螢火蟲','Waitomo'],u:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=600&q=80'},
  {k:['哈比','Hobbiton'],u:'https://images.unsplash.com/photo-1558618047-3c8c76ca7d13?w=600&q=80'},
  {k:['餐廳','晚餐','Rata','Botswana','Clooney','Kohan','Stratosfare'],u:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80'},
  {k:['咖啡','Café','早餐','Vudu','Run76'],u:'https://images.unsplash.com/photo-1445116572660-236099ec97a0?w=600&q=80'},
];
function getPhoto(t,n){const s=(t||'')+' '+(n||'');for(const p of PHOTOS)if(p.k.some(k=>s.includes(k)))return p.u;return'https://images.unsplash.com/photo-1507699622108-4be3abd695ad?w=600&q=80';}

// ── Data parser ──────────────────────────────────
const DAY_EMOJIS=['✈️','📸','🚢','🪂','🏔','🚀','🏙','✨','🏠'];
function mkType(t){if(!t)return'activity';if(/晚餐|午餐|早餐|餐/.test(t))return'food';if(/住宿/.test(t))return'hotel';if(/出發|返回|前往|落地|航班|報到/.test(t))return'transport';return'activity';}

function buildDays(rows){
  const days=[];let cur=null,alt=false;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.length<3)continue;
    const[date,dow,time,type,act,note,place,status]=r;
    if(!date&&act&&act.includes('備案')){alt=true;if(cur)cur.altItems=[];continue;}
    if(date&&String(date).match(/\d{4}\/\d/)){
      alt=false;
      const dp=String(date).replace('2026/','');
      const idx=days.length;
      cur={label:`第${idx+1}天`,dow:dow||'',emoji:DAY_EMOJIS[idx]||'📍',date:dp,region:'',center:{lat:-45.031,lng:168.663},zoom:13,items:[],altPlan:false,altItems:[],mainItems:null,altLabel:'天氣差備案'};
      days.push(cur);
    }
    if(!cur||!act||!act.trim())continue;
    if(!cur.region&&place&&place.trim()&&!place.includes('→')){
      cur.region=place.trim();
      const dc=getDayCenter(place+' '+act);
      cur.center=dc.center;cur.zoom=dc.zoom;
    }
    const isTr=type&&/出發|返回|前往/.test(type);
    const coord=getCoord(place);
    const tags=[];
    const st=status||'';
    if(st.includes('已訂'))tags.push({t:'✅ 已訂',c:'b-ok'});
    else if(st.includes('需預約'))tags.push({t:'🔔 需預約',c:'b-need'});
    if(type&&!/出發|返回|前往/.test(type)){
      const tc=/晚餐|午餐|早餐|餐/.test(type)?'tg':/住宿/.test(type)?'to':/航班|落地/.test(type)?'tb':'tp';
      tags.push({t:type,c:tc});
    }
    if(st.includes('待定'))tags.push({t:'📝 待定',c:'b-tbd'});
    const item={time:time||'',title:act,note:note||'',tags,photo:getPhoto(act,note),ll:coord,mk:mkType(type),loc:act+' New Zealand'};
    if(isTr){
      const tr={type:'tr',icon:'🚗',text:`${time?time+' ':''}${act}${note?' — '+note:''}`};
      if(alt&&cur.altItems)cur.altItems.push(tr);else cur.items.push(tr);
    } else {
      if(alt&&cur.altItems){cur.altItems.push(item);cur.altPlan=true;}
      else cur.items.push(item);
    }
  }
  days.forEach(d=>{if(d.altPlan){d.mainItems=d.items;}if(!d.region)d.region=d.label;});
  return days.filter(d=>d.items.length>0);
}

// ── App state ────────────────────────────────────
let DAYS=[],curDay=0,curAlt=false,curCard=null;
let gmap=null,gmMarkers=[],infoWin=null,placeSvc=null;
let activeCardEl=null;

// Countdown
const dd=Math.ceil((new Date('2026-07-24')-new Date())/864e5);
document.getElementById('cd').textContent=dd>0?`出發倒數 ${dd} 天`:dd===0?'今天出發！':'旅途中';

// ── Google Maps ──────────────────────────────────
const DARK=[
  {elementType:'geometry',stylers:[{color:'#1a1d2a'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#1a1d2a'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#8b8fa8'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#2e3147'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3d55'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1929'}]},
  {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#4a6fa5'}]},
  {featureType:'poi',stylers:[{visibility:'off'}]},
  {featureType:'transit',stylers:[{visibility:'off'}]},
  {featureType:'landscape',elementType:'geometry',stylers:[{color:'#1a1d2a'}]},
];

window.initGoogleMap=function(){
  gmap=new google.maps.Map(document.getElementById('map'),{
    center:{lat:-45.031,lng:168.663},zoom:13,
    styles:DARK,disableDefaultUI:true,gestureHandling:'greedy',
  });
  infoWin=new google.maps.InfoWindow();
  placeSvc=new google.maps.places.PlacesService(gmap);
  calcLayout();
  window.addEventListener('resize',calcLayout);
  loadData();
};

function mkColor(t){return{food:'#25c97a',activity:'#e8527a',transport:'#4da6ff',hotel:'#f0a500'}[t]||'#888';}
function clearMarkers(){gmMarkers.forEach(m=>m.setMap(null));gmMarkers=[];}
function addMarkers(items){
  clearMarkers();let n=1;
  (items||[]).forEach(it=>{
    if(!it||!it.ll||it.type==='tr')return;
    const i=n++;const c=mkColor(it.mk);
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"><circle cx="15" cy="15" r="14" fill="${c}" stroke="rgba(255,255,255,0.45)" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial">${i}</text></svg>`;
    const icon={url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(30,30),anchor:new google.maps.Point(15,15)};
    const m=new google.maps.Marker({position:it.ll,map:gmap,icon,title:it.title});
    m.addListener('click',()=>{
      infoWin.setContent(`<div style="background:#12141f;padding:4px;min-width:150px"><div style="font-size:11px;color:#f0a500;margin-bottom:2px">${it.time||''}</div><div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:6px">${it.title}</div><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.loc||it.title)}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;background:#1a3a6e;border:1px solid #2960ad;color:#7ab8ff;font-size:11px;font-weight:700;text-decoration:none">🗺 導航</a></div>`);
      infoWin.open(gmap,m);
    });
    gmMarkers.push(m);
  });
}

// Get Places photo and update img element
function loadPlacePhoto(imgEl,query){
  if(!placeSvc||!query)return;
  placeSvc.findPlaceFromQuery({query,fields:['photos']},(res,st)=>{
    if(st===google.maps.places.PlacesServiceStatus.OK&&res[0]?.photos?.[0]){
      const url=res[0].photos[0].getUrl({maxWidth:600,maxHeight:300});
      imgEl.src=url;
    }
  });
}

// ── Card toggle ──────────────────────────────────
function toggleCard(el,lat,lng,query){
  const wasOpen=el.classList.contains('active');
  // Close all
  document.querySelectorAll('.card.active').forEach(c=>c.classList.remove('active'));
  if(wasOpen){
    // Collapse: restore carousel height, map back to day view
    isExpanded=false;
    positionCarousel(true);
    const d=DAYS[curDay];
    if(d&&gmap){gmap.panTo(d.center);gmap.setZoom(d.zoom);}
  } else {
    // Expand
    el.classList.add('active');
    isExpanded=true;
    positionCarousel(true);
    // Pan map to item
    if(lat&&lng&&gmap){
      setTimeout(()=>{gmap.panTo({lat,lng});gmap.setZoom(15);},300);
    }
    // Load Places photo
    const img=el.querySelector('.card-photo img');
    if(img&&query&&!img.dataset.loaded){
      img.dataset.loaded='1';
      loadPlacePhoto(img,query);
    }
    // Scroll card into center of track
    setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),100);
  }
}

// ── Dot indicator ────────────────────────────────
let scrollTimer=null;
function setupScrollSpy(items){
  const track=document.getElementById('carousel-track');
  const realItems=items.filter(it=>it.type!=='tr');
  // build dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=realItems.map((_,i)=>`<div class="dot ${i===0?'on':''}"></div>`).join('');

  track.addEventListener('scroll',()=>{
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(()=>{
      // find center card
      const trackRect=track.getBoundingClientRect();
      const cx=trackRect.left+trackRect.width/2;
      let best=null,bestD=Infinity;
      track.querySelectorAll('.card,.card-tr').forEach((c,i)=>{
        const r=c.getBoundingClientRect();
        const d=Math.abs(r.left+r.width/2-cx);
        if(d<bestD){bestD=d;best=i;}
      });
      // update dots
      let ri=0;
      track.querySelectorAll('.card,.card-tr').forEach((c,i)=>{
        if(c.classList.contains('card-tr'))return;
        const dot=dotsEl.children[ri];
        if(dot)dot.className='dot'+(i===best?' on':'');
        ri++;
      });
      // pan map to center card's location
      const cEl=track.children[best];
      if(cEl&&cEl.dataset.lat&&!isExpanded&&gmap){
        const lt=parseFloat(cEl.dataset.lat),ln=parseFloat(cEl.dataset.lng);
        if(lt&&ln){gmap.panTo({lat:lt,lng:ln});gmap.setZoom(14);}
      }
    },120);
  },{passive:true});
}

// ── Render ───────────────────────────────────────
function badgeHtml(tags){
  const ok=tags.find(t=>t.c==='b-ok'),need=tags.find(t=>t.c==='b-need'),tbd=tags.find(t=>t.c==='b-tbd');
  return ok?`<span class="badge b-ok">✅ 已訂</span>`:need?`<span class="badge b-need">🔔 需預約</span>`:tbd?`<span class="badge b-tbd">📝 待定</span>`:'';
}
function renderTabs(){
  document.getElementById('dtabs').innerHTML=DAYS.map((d,i)=>`<div class="dtab ${i===curDay?'on':''}" onclick="selDay(${i})"><span class="de">${d.emoji}</span><span class="dn">${d.label}</span><span class="dd">${d.dow}・${d.date}</span></div>`).join('');
}
function renderDay(){
  const d=DAYS[curDay];if(!d)return;
  isExpanded=false;
  document.getElementById('rgn-label').textContent=d.region;
  if(gmap){gmap.panTo(d.center);gmap.setZoom(d.zoom);}
  const items=d.altPlan&&curAlt?d.altItems:d.items;
  const track=document.getElementById('carousel-track');
  let html='';
  // alt toggle pill
  if(d.altPlan){
    html+=`<div class="alt-pill"><span class="alt-lbl">⚡ 天氣備案</span><div class="toggle"><div class="topt ${!curAlt?'on':''}" onclick="setAlt(false)">正案</div><div class="topt ${curAlt?'on':''}" onclick="setAlt(true)">${d.altLabel||'備案'}</div></div></div>`;
  }
  let idx=1;
  (items||[]).forEach(it=>{
    if(it.type==='tr'){
      html+=`<div class="card-tr"><span class="tr-icon">${it.icon}</span><div class="tr-text">${it.text}</div></div>`;
      return;
    }
    const n=idx++;
    const vis=(it.tags||[]).filter(t=>!['b-ok','b-need','b-tbd'].includes(t.c));
    const nav=it.loc?`<a class="btnav" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.loc)}" target="_blank" onclick="event.stopPropagation()">🗺 Google Maps 導航</a>`:'';
    const lat=it.ll?it.ll.lat:'',lng=it.ll?it.ll.lng:'';
    const q=encodeURIComponent(it.loc||it.title);
    html+=`<div class="card" data-lat="${lat}" data-lng="${lng}" onclick="toggleCard(this,${lat},${lng},'${it.loc||it.title}')">
      <div class="card-photo"><img src="${it.photo}" alt="${it.title}" loading="lazy" onerror="this.src='${it.photo}'"></div>
      <div class="card-body">
        ${badgeHtml(it.tags||[])}
        <div class="card-time">${it.time||''}</div>
        <div class="card-row">
          <div class="card-num">${n}</div>
          <div class="card-title">${it.title}</div>
          <div class="card-arrow">▼</div>
        </div>
        <div class="card-detail">
          <div class="card-note">${it.note||''}</div>
          <div class="tags">${vis.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
          ${nav}
        </div>
      </div>
    </div>`;
  });
  track.innerHTML=html;
  track.scrollLeft=0;
  positionCarousel(false);
  addMarkers(items||[]);
  setupScrollSpy(items||[]);
}

function selDay(i){curDay=i;curAlt=false;renderTabs();renderDay();}
function setAlt(v){curAlt=v;document.querySelectorAll('.topt').forEach((el,i)=>{el.classList.toggle('on',i===(v?1:0));});renderDay();}

// ── Load data ────────────────────────────────────
function loadData(){
  const cb='_cb'+Date.now();
  const s=document.createElement('script');
  s.src=APPS_URL+'?callback='+cb;
  s.onerror=()=>showErr('網路錯誤，請稍後重試');
  window[cb]=data=>{
    delete window[cb];document.head.removeChild(s);
    try{
      DAYS=buildDays(data);
      document.getElementById('loading').style.display='none';
      renderTabs();renderDay();
    }catch(e){showErr(e.message);}
  };
  document.head.appendChild(s);
}
function showErr(msg){
  document.getElementById('loading').innerHTML=`<p style="color:#ff6b6b;text-align:center;padding:20px">載入失敗<br><small>${msg}</small><br><br><button onclick="loadData()" style="margin-top:8px;padding:8px 18px;border-radius:20px;background:var(--pink);border:none;color:#fff;cursor:pointer;font-size:14px">重試</button></p>`;
}
